{% extends "registration/auth_base.html" %}

{% block title %}Customer Master{% endblock %}

{% block content %}
<div class="container mt-4">
    <h3>Customer Master</h3>

    <button class="btn btn-primary mb-3" id="addBtn">+ Add Customer</button>

    <table id="customerTable" class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Email</th>
                <th>Address</th>
                <th>City</th>
                <th>GST</th>
                <th>Action</th>
            </tr>
        </thead>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade" id="customerModal">
   <div class="modal-dialog vehicle-modal-dialog">
    <div class="modal-content">

      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Customer</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="customerForm">
            {% csrf_token %}
            <input type="hidden" name="id" id="id">

            <div class="row">
                <div class="col-md-6 mb-2">
                    <input class="form-control" name="name" id="name" placeholder="Customer Name">
                </div>

                <div class="col-md-6 mb-2">
                    <input class="form-control" name="mobile_no" id="mobile_no" placeholder="Mobile">
                    <small id="mobile_error" class="text-danger"></small>
                </div>

                <div class="col-md-6 mb-2">
                    <input class="form-control" name="email" id="email" placeholder="Email">
                </div>
                <div class="col-md-6 mb-2">
                    <input class="form-control" name="address" id="address" placeholder="address">
                </div>
                <div class="col-md-6 mb-2">
                    <input class="form-control" name="city" id="city" placeholder="City">
                </div>

                <div class="col-md-6 mb-2">
                    <input class="form-control" name="gst_no" id="gst_no" placeholder="GST No">
                </div>
            </div>
        </form>

        <div id="formErrors" class="text-danger"></div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-success" id="saveBtn">Save</button>
      </div>

    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script>
let table;

$(document).ready(function () {

    table = $('#customerTable').DataTable({
        ajax: '/customer/data/',
        columns: [
            { data: 'name' },
            { data: 'mobile_no' },
            { data: 'email' },
            { data: 'address' },
            { data: 'city' },
            { data: 'gst_no' },
            {
                data: 'id',
                render: function (data) {
                    return `
                        <button class="btn btn-sm btn-warning editBtn" data-id="${data}">Edit</button>
                    `;
                }
            }
        ]
    });

});


// ADD
$('#addBtn').click(function () {
    $('#customerForm')[0].reset();
    $('#id').val('');
    $('#formErrors').html('');
    $('.is-invalid').removeClass('is-invalid');
    $('#customerModal').modal('show');
});


// EDIT
$('#customerTable').on('click', '.editBtn', function () {

    let id = $(this).data('id');

    $.get(`/customer/get/${id}/`, function (data) {

        for (let key in data) {
            $('#' + key).val(data[key]);
        }

        $('#customerModal').modal('show');
    });

});


// SAVE
$('#saveBtn').click(function () {

    $('.is-invalid').removeClass('is-invalid');
    $('#formErrors').html('');

    $.post('/customer/save/', $('#customerForm').serialize(), function (res) {

        if (res.success) {
            showToast("Customer details successfully");
            $('#customerModal').modal('hide');
            table.ajax.reload();

        } else {

            for (let field in res.errors) {

                let input = $('#' + field);

                if (input.length) {
                    input.addClass('is-invalid');
                }

                $('#formErrors').append(`<div>${res.errors[field][0]}</div>`);
            }
        }

    });

});


  // live mobile duplicate check
  $('#mobile_no').on('blur', function () {

    let val = $(this).val();

    $.get(`/customer/check-mobile/?mobile=${val}`, function (res) {

        if (res.exists) {
            $('#mobile_no').addClass('is-invalid');
            $('#mobile_error').text("Mobile already exists");
        } else {
            $('#mobile_no').removeClass('is-invalid');
            $('#mobile_error').text("");
        }

    });

});
</script>
{% endblock %}
